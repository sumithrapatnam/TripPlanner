<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>AI Trip Planner</title>

  <!-- CSS -->
  <link rel="stylesheet" href="service_request.css">

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">

      <i class="fa-solid fa-plane"></i>

      TripPlanner

    </div>

    <nav>

      <ul class="nav-links">

        <li><a href="home.html">⬅Back to Home</a></li>

      </ul>

    </nav>

    <button class="plan-btn">

      Plan Your Trip

    </button>

  </header>


  <!-- MAIN SECTION -->

  <section class="search-section">

    <div class="heading">

      <h1 >
        AI Powered Trip Planner
      </h1>

      <p >

        Enter your current location,
        destination, trip days and budget.
        Our AI will create a beautiful
        personalized travel plan for you.

      </p>

    </div>


    <!-- SEARCH CARD -->

    <div class="search-card">

      <h2>

        <i class="fa-solid fa-magnifying-glass"></i>

        Plan Your Journey

      </h2>


      <!-- CURRENT LOCATION -->

      <div class="form-group">

        <label>

          <i class="fa-solid fa-location-crosshairs"></i>

          Current Location

        </label>

        <input
          type="text"
          id="currentLocation"
          placeholder="e.g., Hyderabad"
        >

      </div>


      <!-- DESTINATION -->

      <div class="form-group">

        <label>

          <i class="fa-solid fa-location-dot"></i>

          Destination

        </label>

        <input
          type="text"
          id="destination"
          placeholder="e.g., Goa"
        >

      </div>


      <!-- ROW -->

      <div class="row">

        <!-- DAYS -->

        <div class="form-group">

          <label>

            <i class="fa-regular fa-calendar"></i>

            Number of Days

          </label>

          <input
            type="number"
            id="days"
            placeholder="e.g., 5"
          >

        </div>


        <!-- BUDGET -->

        <div class="form-group">

          <label>

            <i class="fa-solid fa-wallet"></i>

            Budget

          </label>

          <div class="budget-box">

            <input
              type="number"
              id="budget"
              placeholder="e.g., 20000"
            >

            <div class="currency-buttons">

              <button
                class="currency active-currency"
                id="usdBtn"
                type="button"
              >
                USD
              </button>

              <button
                class="currency"
                id="inrBtn"
                type="button"
              >
                INR
              </button>

            </div>

          </div>

        </div>

      </div>


      <!-- BUTTON -->

      <button
        class="search-btn"
        onclick="generateTripPlan()"
      >

        ✨ Generate Trip Plan

      </button>

    </div>


<!-- ADD INSIDE BODY -->
<!-- ABOVE trip-output -->
<!-- ========================= -->

<div class="trip-navigation">

  <button onclick="scrollToSection('description')">
    Destination
  </button>

  <button onclick="scrollToSection('map-section')">
    Route Map
  </button>

  <button onclick="scrollToSection('weather-section')">
    Weather
  </button>

  <button onclick="scrollToSection('itinerary-section')">
    Itinerary
  </button>

  <button onclick="scrollToSection('budget-section')">
    Budget
  </button>

</div>

    <div id="trip-output"></div>

  </section>

  <!-- JS -->
  <script src="service_request.js"></script>

</body>

</html>
